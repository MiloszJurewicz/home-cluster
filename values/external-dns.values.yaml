provider:
  name: rfc2136

sources:
  - service
  - ingress
  - traefik-proxy

policy: upsert-only
registry: noop
interval: 1m

extraArgs:
  rfc2136-host: technitium-technitium-dns-server-dns-tcp.dns.svc.cluster.local
  rfc2136-port: "53"
  rfc2136-zone: home.arpa
  rfc2136-tsig-secret-alg: hmac-sha256
  rfc2136-tsig-keyname: external-dns

env:
  - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
    valueFrom:
      secretKeyRef:
        name: technitium-tsig
        key: secret
