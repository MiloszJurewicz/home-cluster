---
# kube-prometheus-stack — Prometheus + Grafana (+ Alertmanager)
# Collection (node-exporter, kube-state-metrics) is handled by k8s-monitoring/Alloy.
# This chart provides: Prometheus (metrics receiver), Grafana (dashboards).

# All scraping is done by Alloy. kps Prometheus is receive-only (remote write).
# Disable every ServiceMonitor kps would create:
nodeExporter:
  enabled: false
kubeStateMetrics:
  enabled: false
kubelet:
  enabled: false
kubeApiServer:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
coreDns:
  enabled: false

# --- Prometheus ---
prometheus:
  prometheusSpec:
    # Accept remote write from Alloy
    enableRemoteWriteReceiver: true
    # Retention
    retention: 7d
    retentionSize: 15GB
    # Persistent storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi

  # --- Ingress ---
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: Prometheus
      gethomepage.dev/description: Metrics & Alerting
      gethomepage.dev/group: Monitoring
      gethomepage.dev/href: "http://prometheus.home.arpa"
      gethomepage.dev/icon: prometheus.png
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=prometheus"
    hosts:
      - prometheus.home.arpa
    paths:
      - /
    pathType: Prefix

# --- Grafana ---
grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi
  # Pre-configure Loki as a data source
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
  # --- OIDC (Authentik) ---
  env:
    GF_SERVER_ROOT_URL: "https://grafana.home.arpa"
    GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
    GF_AUTH_GENERIC_OAUTH_NAME: "Authentik"
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "12cf8921baf2ac5a7b16e5c756fb725d336b454b"
    GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email entitlements"
    GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://auth.home.arpa/application/o/authorize/"
    # Server-to-server: use internal HTTP (no TLS issues)
    GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://authentik-server.authentik.svc.cluster.local/application/o/token/"
    GF_AUTH_GENERIC_OAUTH_API_URL: "http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/"
    GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(entitlements[*], 'Grafana Admins') && 'Admin' || contains(entitlements[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
    GF_AUTH_SIGNOUT_REDIRECT_URL: "https://auth.home.arpa/application/o/grafana/end-session/"
  # --- Ingress ---
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: Grafana
      gethomepage.dev/description: Dashboards & Logs
      gethomepage.dev/group: Monitoring
      gethomepage.dev/href: "http://grafana.home.arpa"
      gethomepage.dev/icon: grafana.png
      gethomepage.dev/pod-selector: "app.kubernetes.io/name=grafana"
    hosts:
      - grafana.home.arpa
    path: /
    pathType: Prefix
