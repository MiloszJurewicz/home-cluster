persistentVolumeClaim:
  enabled: true

admin:
  enabled: true
  existingSecret: pihole-admin
  passwordKey: password

serviceWeb:
  # ClusterIP — routed through Traefik IngressRoute
  type: ClusterIP

serviceDns:
  # LoadBalancer — ServiceLB binds hostPort 53
  type: LoadBalancer

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - pihole.home.arpa
  tls:
    - hosts:
        - pihole.home.arpa
  path: /
  pathType: ImplementationSpecific