---
# Helmfile for home-cluster
# Manages Helm chart deployments across the cluster

repositories:
  - name: headlamp
    url: https://kubernetes-sigs.github.io/headlamp/
  - name: jetstack
    url: https://charts.jetstack.io
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name: mojo2600
    url: https://mojo2600.github.io/pihole-kubernetes/
  - name: metallb
    url: https://metallb.github.io/metallb
  - name : external-dns
    url: https://kubernetes-sigs.github.io/external-dns/
  - name: jetstack
    url: https://charts.jetstack.io


releases:
  - name: metallb
    namespace: metallb-system
    chart: metallb/metallb
    version: 0.16.1
  - name: metallb-pool
    needs:
      - metallb
    namespace: metallb-system
    chart: ./charts/metallb-pool
    values:
      - ./values/metallb-pool.values.yaml
  - name: pihole-admin-secret
    namespace: pihole
    chart: ./manifests/pihole-admin-secret
  - name: pihole-admin-secret-kube-system
    namespace: kube-system
    chart: ./manifests/pihole-admin-secret
  - name: pihole
    needs:
      - pihole-admin-secret
    namespace: pihole
    chart: mojo2600/pihole
    version: 2.36.0
    values:
      - ./values/pihole.values.yaml
  - name: external-dns
    needs:
      - pihole-admin-secret-kube-system
    namespace: kube-system
    chart: external-dns/external-dns
    version: 1.21.1
    values:
      - ./values/external-dns.values.yaml
  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    chart: jetstack/cert-manager
    version: 1.20.2
    set:
      - name: installCRDs
        value: true
  - name: cert-manager-issuers
    needs:
      - cert-manager
    namespace: cert-manager
    chart: ./charts/cert-manager-issuers
    values:
      - certificate:
          name: wildcard-home-arpa
          namespace: kube-system
          secretName: default-tls-cert
          subject:
            organizations:
              - "Quack Cluster"
            organizationalUnits:
              - "Quackerspace"
            countries:
              - "PL"
            provinces:
              - "Silesia"
            localities:
              - "Warsaw"
          commonName: "*.home.arpa"
          dnsNames:
            - "*.home.arpa"
  - name: my-headlamp
    namespace: kube-system
    chart: headlamp/headlamp
    version: 0.41.0

