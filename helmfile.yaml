---
# Helmfile for home-cluster
# Manages Helm chart deployments across the cluster

environments:
  default:
    values:
      - rootDomain: home.arpa
      - caCertPath: ../certs/root-ca.crt
      - caKeyPath: ../certs/root-ca.key

---
repositories:
  - name: headlamp
    url: https://kubernetes-sigs.github.io/headlamp/
  - name: grafana-community
    url: https://grafana-community.github.io/helm-charts
  - name: jetstack
    url: https://charts.jetstack.io
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name : external-dns
    url: https://kubernetes-sigs.github.io/external-dns/
  - name: jetstack
    url: https://charts.jetstack.io
  - name: jameswynn
    url: https://jameswynn.github.io/helm-charts
  - name: goauthentik
    url: https://charts.goauthentik.io


releases:
  - name: external-dns
    needs:
      - kube-system/technitium-tsig-secret
    namespace: kube-system
    chart: external-dns/external-dns
    version: 1.21.1
    values:
      - ./values/external-dns.values.yaml
  - name: technitium-tsig-secret
    namespace: kube-system
    chart: ./manifests/technitium-tsig-secret
  - name: technitium
    namespace: dns
    createNamespace: true
    chart: ./charts/technitium-dns
    values:
      - ./values/technitium.values.yaml
  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    chart: jetstack/cert-manager
    version: 1.20.2
    set:
      - name: installCRDs
        value: true
  - name: root-ca-bootstrap
    needs:
      - cert-manager
    namespace: cert-manager
    chart: ./charts/root-ca-bootstrap
    values:
      - ./values/root-ca-bootstrap.values.yaml.gotmpl
  - name: leaf-cert
    needs:
      - cert-manager/root-ca-bootstrap
    namespace: kube-system
    chart: ./charts/leaf-cert
    values:
      - ./values/leaf-cert.values.yaml.gotmpl
  - name: traefik-default-tls
    needs:
      - kube-system/leaf-cert
    namespace: kube-system
    chart: ./charts/traefik-default-tls
    values:
      - tlsStore:
          name: default
          namespace: kube-system
          secretName: default-tls-cert

