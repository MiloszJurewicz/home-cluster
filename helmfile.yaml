  - name: home
    namespace: homepage
    createNamespace: true
    chart: jameswynn/homepage
    values:
      - ./values/homepage.values.yaml
  - name: ngnix-test
    namespace: default
    chart: ./manifests/ngnix-test
  - name: loki
    namespace: monitoring
    createNamespace: true
    chart: grafana-community/loki
    values:
      - ./values/loki.values.yaml
  - name: k8s-monitoring
    needs:
      - monitoring/loki
    namespace: monitoring
    chart: grafana/k8s-monitoring
    version: 4.1.6
    values:
      - ./values/k8s-monitoring.values.yaml
  - name: kps
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: 87.0.0
    values:
      - ./values/prometheus.values.yaml
  - name: authentik-blueprints
    namespace: authentik
    chart: ./manifests/authentik-blueprints
    needs:
      - kube-system/leaf-cert
  - name: authentik
    namespace: authentik
    createNamespace: true
    chart: goauthentik/authentik
    version: 2026.5.3
    needs:
      - cert-manager/root-ca-bootstrap
      - kube-system/leaf-cert
      - authentik/authentik-blueprints
    values:
      - ./values/authentik.values.yaml
