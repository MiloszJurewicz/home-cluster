{{- $existing := lookup "v1" "Secret" .Release.Namespace "technitium-tsig" }}
{{- if $existing }}
{{- /* Reuse existing secret value */}}
apiVersion: v1
kind: Secret
metadata:
  name: technitium-tsig
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  secret: {{ index $existing.data "secret" | quote }}
{{- else }}
{{- /* First install: generate a new secret */}}
apiVersion: v1
kind: Secret
metadata:
  name: technitium-tsig
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  secret: {{ randAlphaNum 44 | quote }}
{{- end }}
