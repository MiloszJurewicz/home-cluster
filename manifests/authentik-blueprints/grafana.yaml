apiVersion: v1
kind: ConfigMap
metadata:
  name: blueprint-grafana
  namespace: authentik
data:
  grafana.yaml: |
    version: 1
    metadata:
      name: grafana-oidc
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        id: grafana-provider
        identifiers:
          name: grafana
        attrs:
          client_type: confidential
          client_id: grafana
          client_secret: "12cf8921baf2ac5a7b16e5c756fb725d336b454b"
          redirect_uris:
            - url: "https://grafana.home.arpa/login/generic_oauth"
              matching_mode: strict
              type: authorization
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          authentication_flow: null
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          issuer_mode: per_provider
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          access_code_validity: minutes=1
          access_token_validity: minutes=10
          refresh_token_validity: days=30
          grant_types:
            - authorization_code
            - refresh_token
            - client_credentials
            - password
            - urn:ietf:params:oauth:grant-type:device_code
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'openid'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'profile'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: OpenID 'email'"]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, "authentik default OAuth Mapping: Application Entitlements"]]
          logout_uri: "https://grafana.home.arpa/logout"
      - model: authentik_core.application
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          provider: !KeyOf grafana-provider
          meta_launch_url: https://grafana.home.arpa
          meta_icon: ""
