apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certificate.selfSignedIssuerName }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certificate.issuerName }}
spec:
  ca:
    secretName: {{ .Values.certificate.secretName }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificate.name }}
  namespace: {{ .Values.certificate.namespace }}
spec:
  secretName: {{ .Values.certificate.secretName }}
  isCA: true
  subject:
    organizations:
{{ toYaml .Values.certificate.subject.organizations | indent 6 }}
    organizationalUnits:
{{ toYaml .Values.certificate.subject.organizationalUnits | indent 6 }}
    countries:
{{ toYaml .Values.certificate.subject.countries | indent 6 }}
    provinces:
{{ toYaml .Values.certificate.subject.provinces | indent 6 }}
    localities:
{{ toYaml .Values.certificate.subject.localities | indent 6 }}
  commonName: {{ .Values.certificate.rootCommonName | default .Values.certificate.rootDomain | quote }}
  dnsNames:
    - {{ .Values.certificate.rootDomain | quote }}
    - {{ printf "*.%s" .Values.certificate.rootDomain | quote }}
  issuerRef:
    name: {{ .Values.certificate.selfSignedIssuerName }}
    kind: ClusterIssuer
