apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificate.name }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.certificate.secretName }}
  commonName: {{ .Values.certificate.rootDomain | quote }}
  dnsNames:
    - {{ .Values.certificate.rootDomain | quote }}
    - {{ printf "*.%s" .Values.certificate.rootDomain | quote }}
  issuerRef:
    name: {{ .Values.certificate.issuerName }}
    kind: ClusterIssuer
